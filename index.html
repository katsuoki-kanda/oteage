<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pose Rhythm Game - Exclusive Input Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #score { font-size: 40px; font-weight: bold; color: #fff; }
        #timer { font-size: 24px; color: #ffcc00; }
        
        #hand-status { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .hand-badge { 
            padding: 10px 20px; background: rgba(0,0,0,0.6); border: 2px solid #555; 
            color: #888; border-radius: 12px; font-weight: bold; font-size: 18px;
            transition: all 0.1s ease; text-align: center; min-width: 100px;
        }
        .active-left { background: rgba(255, 0, 0, 0.5); border-color: #ff3333; color: #fff; box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
        .active-right { background: rgba(0, 0, 255, 0.5); border-color: #3333ff; color: #fff; box-shadow: 0 0 20px rgba(0, 0, 255, 0.6); }
        .active-both { background: rgba(255, 255, 0, 0.6); border-color: #ffff00; color: #000; box-shadow: 0 0 25px rgba(255, 255, 0, 0.8); }

        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 48px; text-align: center; text-shadow: 3px 3px 10px rgba(0,0,0,1); pointer-events: none; z-index: 11; }
        video { display: none; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="timer">TIME: 60</div>
    </div>
    
    <div id="hand-status">
        <div id="left-badge" class="hand-badge">LEFT</div>
        <div id="right-badge" class="hand-badge">RIGHT</div>
    </div>

    <div id="msg">片手を上げてスタート！</div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const scoreDisplay = document.getElementById('score');
const timerDisplay = document.getElementById('timer');
const msgDisplay = document.getElementById('msg');
const leftBadge = document.getElementById('left-badge');
const rightBadge = document.getElementById('right-badge');

// --- ゲーム設定 ---
let score = 0;
let timeLeft = 60;
let gameState = 'WAITING';
const JUDGE_LINE_X = 150; 
const BALL_SPEED = 9;
let balls = [];
let effects = [];
let lastSpawnTime = 0;
let gameTimerInterval;

let leftHandUp = false;
let rightHandUp = false;
let prevLeftHandUp = false;
let prevRightHandUp = false;
let judgeLineGlow = 0;

// --- 効果音再生用 (音量 0.7) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playHitSound(freq, vol = 0.7) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

// --- エフェクトクラス ---
class FeedbackText {
    constructor(x, y, text, color) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.life = 1.0;
    }
    draw() {
        canvasCtx.save();
        canvasCtx.globalAlpha = this.life;
        canvasCtx.fillStyle = this.color;
        canvasCtx.font = "bold 60px Arial";
        canvasCtx.textAlign = "center";
        canvasCtx.fillText(this.text, this.x, this.y);
        canvasCtx.restore();
        this.y -= 3;
        this.life -= 0.03;
    }
}

// --- 玉クラス ---
class Ball {
    constructor() {
        this.r = 35;
        this.x = canvasElement.width + this.r;
        this.y = Math.random() * (canvasElement.height - 200) + 100;
        this.active = true;
        this.wasHandMatchOnEntry = false; 
        this.hasEnteredZone = false;

        const rand = Math.random();
        if (rand < 0.33) { this.type = 'RED'; this.color = '#ff3333'; }
        else if (rand < 0.66) { this.type = 'BLUE'; this.color = '#3333ff'; }
        else { this.type = 'YELLOW'; this.color = '#ffff00'; }
    }
    update() {
        this.x -= BALL_SPEED;
        if (this.x < -this.r) this.active = false;
    }
    draw() {
        canvasCtx.beginPath();
        canvasCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        canvasCtx.fillStyle = this.color;
        canvasCtx.fill();
        canvasCtx.strokeStyle = 'white';
        canvasCtx.lineWidth = 4;
        canvasCtx.stroke();
    }
}

// --- メイン処理 ---
function onResults(results) {
    if (canvasElement.width !== window.innerWidth) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    canvasCtx.translate(canvasElement.width, 0);
    canvasCtx.scale(-1, 1);
    const videoRatio = videoElement.videoWidth / videoElement.videoHeight;
    const canvasRatio = canvasElement.width / canvasElement.height;
    let drawWidth, drawHeight;
    if (canvasRatio > videoRatio) {
        drawWidth = canvasElement.width;
        drawHeight = canvasElement.width / videoRatio;
    } else {
        drawWidth = canvasElement.height * videoRatio;
        drawHeight = canvasElement.height;
    }
    canvasCtx.drawImage(results.image, (canvasElement.width - drawWidth) / 2, (canvasElement.height - drawHeight) / 2, drawWidth, drawHeight);
    canvasCtx.restore();

    canvasCtx.beginPath();
    canvasCtx.moveTo(JUDGE_LINE_X, 0);
    canvasCtx.lineTo(JUDGE_LINE_X, canvasElement.height);
    canvasCtx.lineWidth = judgeLineGlow > 0 ? 12 : 6;
    canvasCtx.strokeStyle = judgeLineGlow > 0 ? `rgba(0, 255, 0, 1)` : `rgba(0, 255, 0, 0.6)`;
    canvasCtx.stroke();
    if (judgeLineGlow > 0) judgeLineGlow--;

    if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        prevLeftHandUp = leftHandUp;
        prevRightHandUp = rightHandUp;

        leftHandUp = landmarks[15].y < landmarks[13].y;
        rightHandUp = landmarks[16].y < landmarks[14].y;

        updateIndicatorUI();

        if (gameState === 'WAITING') {
            if (leftHandUp || rightHandUp) startGame();
        } else if (gameState === 'PLAYING') {
            updateGame();
        }
    }

    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());
}

function updateIndicatorUI() {
    leftBadge.className = 'hand-badge';
    rightBadge.className = 'hand-badge';
    if (leftHandUp && rightHandUp) {
        leftBadge.classList.add('active-both');
        rightBadge.classList.add('active-both');
    } else if (leftHandUp) {
        leftBadge.classList.add('active-left');
    } else if (rightHandUp) {
        rightBadge.classList.add('active-right');
    }
}

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    score = 0; timeLeft = 60; balls = []; effects = [];
    gameState = 'PLAYING';
    msgDisplay.innerText = "";
    scoreDisplay.innerText = `SCORE: ${score}`;
    if (gameTimerInterval) clearInterval(gameTimerInterval);
    gameTimerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = `TIME: ${timeLeft}`;
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function updateGame() {
    const now = Date.now();
    if (now - lastSpawnTime > 800 && Math.random() < 0.1) {
        balls.push(new Ball());
        lastSpawnTime = now;
    }

    const leftJustRaised = leftHandUp && !prevLeftHandUp;
    const rightJustRaised = rightHandUp && !prevRightHandUp;

    balls.forEach(ball => {
        if (!ball.active) return;
        ball.update();
        ball.draw();

        const dist = Math.abs(ball.x - JUDGE_LINE_X);
        
        // 排他的な手の状態判定（左右どちらかのみ、または両方）
        const isOnlyLeft = leftHandUp && !rightHandUp;
        const isOnlyRight = rightHandUp && !leftHandUp;
        const isBoth = leftHandUp && rightHandUp;

        const isJustOnlyLeft = leftJustRaised && !rightHandUp;
        const isJustOnlyRight = rightJustRaised && !leftHandUp;
        const isJustBoth = (leftJustRaised || rightJustRaised) && isBoth;

        if (dist < 50 && !ball.hasEnteredZone) {
            ball.hasEnteredZone = true;
            // ゾーン突入時に条件を満たしていたか
            if (ball.type === 'RED') ball.wasHandMatchOnEntry = isOnlyLeft;
            if (ball.type === 'BLUE') ball.wasHandMatchOnEntry = isOnlyRight;
            if (ball.type === 'YELLOW') ball.wasHandMatchOnEntry = isBoth;
        }

        if (dist < 50) {
            let getPoints = 0;
            let currentMatch = false;
            let currentJustRaised = false;

            if (ball.type === 'RED') {
                currentMatch = isOnlyLeft;
                currentJustRaised = isJustOnlyLeft;
            } else if (ball.type === 'BLUE') {
                currentMatch = isOnlyRight;
                currentJustRaised = isJustOnlyRight;
            } else if (ball.type === 'YELLOW') {
                currentMatch = isBoth;
                currentJustRaised = isJustBoth;
            }

            if (currentMatch) {
                if (ball.wasHandMatchOnEntry && ball.x <= JUDGE_LINE_X) {
                    getPoints = 1;
                } 
                else if (!ball.wasHandMatchOnEntry && currentJustRaised) {
                    getPoints = (dist < 20) ? 3 : 2;
                }

                if (getPoints > 0) {
                    score += getPoints;
                    scoreDisplay.innerText = `SCORE: ${score}`;
                    playHitSound(220 * (getPoints + 1));
                    effects.push(new FeedbackText(JUDGE_LINE_X + 100, ball.y, getPoints.toString(), getPoints === 3 ? "#ff69b4" : "#ffffff"));
                    judgeLineGlow = 10;
                    ball.active = false;
                }
            }
        }
    });
    balls = balls.filter(b => b.active);
}

function endGame() {
    clearInterval(gameTimerInterval);
    gameState = 'COOLDOWN';
    msgDisplay.innerHTML = `終了！ SCORE: ${score}<br><span style="font-size:20px">3秒後に受付再開します...</span>`;
    setTimeout(() => {
        gameState = 'WAITING';
        msgDisplay.innerText = "片手を上げてスタート！";
    }, 3000);
}

const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
pose.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await pose.send({image: videoElement}); },
    width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
